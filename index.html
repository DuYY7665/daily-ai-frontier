<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日AI前沿 | Daily AI Frontier</title>
  <style>
    /* ═══════ Reset & Tokens ═══════ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --text-2: #475569;
      --text-3: #94a3b8;
      --accent: #6366f1;
      --accent-h: #4f46e5;
      --border: #e2e8f0;
      --border-2: #cbd5e1;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -2px rgba(0,0,0,.05);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.08), 0 4px 6px -4px rgba(0,0,0,.04);
      --p0: #dc2626; --p0-bg: #fef2f2; --p0-fg: #fca5a5;
      --p1: #2563eb; --p1-bg: #eff6ff; --p1-fg: #93c5fd;
      --p2: #64748b; --p2-bg: #f8fafc; --p2-fg: #cbd5e1;
      --like: #ef4444;
      --r: 12px; --r-sm: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
              'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ═══════ Header ═══════ */
    .header {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 45%, #4338ca 100%);
      color: #fff;
      padding: 44px 24px 36px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 25% 40%, rgba(99,102,241,.35), transparent),
        radial-gradient(ellipse 50% 60% at 75% 60%, rgba(139,92,246,.25), transparent);
      animation: drift 10s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-3%, -2%) scale(1.05); }
    }
    .header-inner { position: relative; z-index: 1; max-width: 920px; margin: 0 auto; }
    .header h1 {
      font-size: 34px; font-weight: 800; letter-spacing: 3px; margin-bottom: 6px;
      text-shadow: 0 2px 12px rgba(0,0,0,.2);
    }
    .header .sub {
      font-size: 13px; font-weight: 300; opacity: .65; letter-spacing: 2px;
      text-transform: uppercase;
    }
    .header-stats {
      display: flex; justify-content: center; gap: 28px;
      margin-top: 22px; font-size: 13px; font-weight: 500;
    }
    .header-stats .s { display: inline-flex; align-items: center; gap: 5px; }
    .header-stats .dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    }

    /* ═══════ Filter Bar ═══════ */
    .filter-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      box-shadow: var(--shadow-sm);
    }
    .filter-inner { max-width: 920px; margin: 0 auto; }

    .search-box {
      position: relative; margin-bottom: 12px;
    }
    .search-box svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: var(--text-3);
    }
    .search-input {
      width: 100%; padding: 10px 16px 10px 40px;
      border: 1.5px solid var(--border); border-radius: var(--r-sm);
      font-size: 14px; font-family: var(--font);
      background: var(--card); color: var(--text);
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .search-input::placeholder { color: var(--text-3); }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,.12);
    }

    .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .pill-group { display: flex; gap: 4px; }
    .pill {
      padding: 5px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      border: 1.5px solid var(--border); background: var(--card);
      color: var(--text-2); transition: all .2s; white-space: nowrap;
      font-family: var(--font);
    }
    .pill:hover { border-color: var(--accent); color: var(--accent); }
    .pill.on { background: var(--accent); color: #fff; border-color: var(--accent); }
    .pill[data-p="0"].on { background: var(--p0); border-color: var(--p0); }
    .pill[data-p="1"].on { background: var(--p1); border-color: var(--p1); }
    .pill[data-p="2"].on { background: var(--p2); border-color: var(--p2); }

    .sep { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }
    .f-select {
      padding: 5px 28px 5px 12px; border-radius: 20px;
      font-size: 13px; border: 1.5px solid var(--border);
      background: var(--card); color: var(--text); outline: none;
      cursor: pointer; font-family: var(--font);
      appearance: none; -webkit-appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%2394a3b8' fill='none' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 10px center;
    }
    .f-select:focus { border-color: var(--accent); }

    /* ═══════ Main ═══════ */
    .main { max-width: 920px; margin: 0 auto; padding: 24px 24px 80px; }

    /* Loading */
    .loading { text-align: center; padding: 80px 20px; color: var(--text-3); }
    .spinner {
      width: 36px; height: 36px; margin: 0 auto 14px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty */
    .empty { text-align: center; padding: 80px 20px; color: var(--text-3); }
    .empty svg { width: 56px; height: 56px; margin-bottom: 14px; opacity: .4; }

    /* ═══════ Card ═══════ */
    .card {
      background: var(--card);
      border-radius: var(--r);
      border-left: 4px solid var(--border-2);
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      transition: box-shadow .3s, transform .3s;
      opacity: 0; transform: translateY(16px);
      animation: fadeUp .45s ease forwards;
      overflow: hidden;
    }
    .card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .card[data-p="0"] { border-left-color: var(--p0); }
    .card[data-p="1"] { border-left-color: var(--p1); }
    .card[data-p="2"] { border-left-color: var(--p2); }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    /* Card Header */
    .c-head {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 20px 6px; flex-wrap: wrap;
    }
    .badge {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 2px 9px; border-radius: 5px;
      font-size: 11px; font-weight: 700; letter-spacing: .5px;
      line-height: 1.6;
    }
    .badge-0 { background: var(--p0); color: #fff; }
    .badge-1 { background: var(--p1); color: #fff; }
    .badge-2 { background: var(--p2); color: #fff; }

    .cat {
      display: inline-flex; padding: 2px 10px; border-radius: 5px;
      font-size: 12px; font-weight: 500; line-height: 1.6;
    }
    .cat-应用落地与工具 { background: #dcfce7; color: #166534; }
    .cat-Agent智能体     { background: #fce7f3; color: #9d174d; }
    .cat-模型技术        { background: #dbeafe; color: #1e40af; }
    .cat-方法论与研究    { background: #fef3c7; color: #92400e; }
    .cat-行业生态与政策  { background: #e0e7ff; color: #3730a3; }

    .plat { font-size: 12px; color: var(--text-2); font-weight: 500; }
    .c-date {
      font-size: 12px; color: var(--text-3); margin-left: auto; font-variant-numeric: tabular-nums;
    }

    /* Card Body */
    .c-body { padding: 4px 20px 14px; }
    .summary {
      font-size: 14px; line-height: 1.75; color: var(--text);
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card.open .summary { -webkit-line-clamp: unset; }

    /* Card Footer */
    .c-foot {
      display: flex; align-items: center; justify-content: flex-end;
      gap: 10px; padding: 0 20px 14px;
    }
    .c-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 14px; border-radius: 20px;
      border: 1.5px solid var(--border); background: var(--card);
      cursor: pointer; font-size: 13px; color: var(--text-2);
      transition: all .2s; font-family: var(--font); line-height: 1;
    }
    .c-btn:hover { border-color: var(--accent); color: var(--accent); }
    .c-btn svg { width: 14px; height: 14px; }

    .like-btn.liked { border-color: var(--like); color: var(--like); background: var(--p0-bg); }
    .like-btn.liked .h-icon { animation: pop .3s ease; }
    @keyframes pop { 50% { transform: scale(1.3); } }

    /* Card Detail */
    .c-detail { max-height: 0; overflow: hidden; transition: max-height .5s cubic-bezier(.4,0,.2,1); }
    .card.open .c-detail { max-height: 4000px; }

    .c-detail-inner {
      padding: 0 20px 20px; border-top: 1px solid var(--border);
      margin-top: 2px; padding-top: 16px;
    }
    .d-label {
      font-size: 11px; font-weight: 700; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px;
    }
    .d-text {
      font-size: 14px; line-height: 1.85; color: var(--text-2);
      white-space: pre-wrap; margin-bottom: 18px;
    }
    .d-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--accent); text-decoration: none; font-size: 13px;
      word-break: break-all; transition: color .2s;
    }
    .d-link:hover { color: var(--accent-h); text-decoration: underline; }
    .d-link svg { width: 14px; height: 14px; flex-shrink: 0; }

    .en-toggle {
      font-size: 13px; color: var(--accent); cursor: pointer;
      border: none; background: none; padding: 6px 0;
      font-family: var(--font); font-weight: 500;
    }
    .en-toggle:hover { text-decoration: underline; }
    .en-body {
      display: none; margin-top: 10px; padding: 14px 16px;
      background: #f8fafc; border-radius: var(--r-sm);
      font-size: 13px; line-height: 1.75; color: var(--text-3);
      white-space: pre-wrap; border-left: 3px solid var(--border);
    }
    .en-body.show { display: block; }

    /* ═══════ Back Top ═══════ */
    .back-top {
      position: fixed; bottom: 28px; right: 28px;
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--accent); color: #fff; border: none;
      cursor: pointer; font-size: 18px; line-height: 1;
      display: none; align-items: center; justify-content: center;
      box-shadow: var(--shadow-md); transition: all .25s; z-index: 999;
    }
    .back-top:hover { background: var(--accent-h); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .back-top.show { display: flex; }

    /* ═══════ Footer ═══════ */
    .footer {
      text-align: center; padding: 20px 24px 28px;
      color: var(--text-3); font-size: 12px; letter-spacing: .5px;
    }

    /* ═══════ Responsive ═══════ */
    @media (max-width: 640px) {
      .header { padding: 30px 16px 26px; }
      .header h1 { font-size: 24px; letter-spacing: 2px; }
      .header-stats { gap: 14px; font-size: 12px; flex-wrap: wrap; }
      .filter-bar { padding: 12px 16px; }
      .main { padding: 16px 12px 60px; }
      .c-head { padding: 12px 16px 6px; }
      .c-body { padding: 4px 16px 12px; }
      .c-foot { padding: 0 16px 12px; }
      .c-detail-inner { padding: 0 16px 16px; padding-top: 12px; }
      .c-date { margin-left: 0; }
      .sep { display: none; }
    }
  </style>
</head>
<body>

<!-- ═══ Header ═══ -->
<header class="header">
  <div class="header-inner">
    <h1>每日AI前沿</h1>
    <p class="sub">Daily AI Frontier &middot; 全球AI资讯聚合平台</p>
    <div class="header-stats" id="stats">
      <span class="s"><span class="dot" style="background:#fff"></span> 加载中...</span>
    </div>
  </div>
</header>

<!-- ═══ Filter Bar ═══ -->
<div class="filter-bar">
  <div class="filter-inner">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="q" placeholder="搜索资讯（平台、分类、关键词）...">
    </div>
    <div class="filters">
      <div class="pill-group" id="pills">
        <button class="pill on" data-p="">全部</button>
        <button class="pill" data-p="0">P0 非常相关</button>
        <button class="pill" data-p="1">P1 相关</button>
        <button class="pill" data-p="2">P2 关注</button>
      </div>
      <div class="sep"></div>
      <select class="f-select" id="fCat"><option value="">全部分类</option></select>
      <select class="f-select" id="fPlat"><option value="">全部平台</option></select>
      <select class="f-select" id="fDate"><option value="">全部日期</option></select>
    </div>
  </div>
</div>

<!-- ═══ Main ═══ -->
<main class="main" id="app">
  <div class="loading"><div class="spinner"></div><p>正在加载资讯...</p></div>
</main>

<!-- ═══ Footer ═══ -->
<footer class="footer">每日AI前沿 &middot; 工作日自动更新 &middot; Powered by Supabase</footer>

<!-- ═══ Back Top ═══ -->
<button class="back-top" id="bt" aria-label="回到顶部">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 15l-6-6-6 6"/></svg>
</button>

<!-- ═══ JS ═══ -->
<script>
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

/* ── Supabase REST API 配置 ── */
const API_BASE = 'https://cgrjrzogttcdijaibyls.supabase.co/rest/v1';
const API_KEY = 'sb_publishable__4gpm5VC3I6sVPL0ifAUSA_RWFsdNIk';
const HEADERS = {
  'apikey': API_KEY,
  'Authorization': `Bearer ${API_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

/* ── State ── */
const S = {
  data: [],
  f: { p: '', cat: '', plat: '', date: '', q: '' },
  liked: new Set(),
  open: new Set(),
  filters: { platforms: [], categories: [], dates: [] },
  counts: { p0: 0, p1: 0, p2: 0, total: 0 }
};

/* ── 从 Supabase REST API 拉取资讯 ── */
async function fetchNews() {
  let params = new URLSearchParams();
  params.set('select', '*');
  params.set('order', 'priority.asc,date.desc,id.desc');
  params.set('limit', '200');

  let filters = [];
  if (S.f.p !== '') filters.push(`priority=eq.${S.f.p}`);
  if (S.f.cat) filters.push(`category=eq.${S.f.cat}`);
  if (S.f.plat) filters.push(`platform=eq.${S.f.plat}`);
  if (S.f.date) {
    filters.push(`date=gte.${S.f.date}T00:00:00`);
    filters.push(`date=lt.${S.f.date}T23:59:59`);
  }
  if (S.f.q) {
    const q = encodeURIComponent(`%${S.f.q}%`);
    filters.push(`or=(summary.ilike.${q},cn_text.ilike.${q},platform.ilike.${q})`);
  }

  const filterStr = filters.length ? '&' + filters.join('&') : '';
  const url = `${API_BASE}/ai_news?${params}${filterStr}`;

  try {
    const resp = await fetch(url, {
      headers: { ...HEADERS, 'Prefer': 'count=exact' }
    });
    const data = await resp.json();
    const total = parseInt(resp.headers.get('content-range')?.split('/')[1] || data.length);
    return { data: data || [], total };
  } catch(e) {
    console.error('API error:', e);
    return null;
  }
}

/* ── 获取筛选选项和统计 ── */
async function fetchFiltersAndCounts() {
  try {
    const [allRes, p0Res, p1Res, p2Res] = await Promise.all([
      fetch(`${API_BASE}/ai_news?select=category,platform,date`, { headers: HEADERS }).then(r => r.json()),
      fetch(`${API_BASE}/ai_news?select=id&priority=eq.0`, { headers: { ...HEADERS, 'Prefer': 'count=exact' } }),
      fetch(`${API_BASE}/ai_news?select=id&priority=eq.1`, { headers: { ...HEADERS, 'Prefer': 'count=exact' } }),
      fetch(`${API_BASE}/ai_news?select=id&priority=eq.2`, { headers: { ...HEADERS, 'Prefer': 'count=exact' } }),
    ]);

    const unique = (arr, key) => [...new Set(arr.map(r => r[key]).filter(Boolean))].sort();
    S.filters.categories = unique(allRes, 'category');
    S.filters.platforms = unique(allRes, 'platform');
    S.filters.dates = [...new Set(allRes.map(r => fmtDate(r.date)).filter(Boolean))].sort().reverse();

    const getCount = (resp) => parseInt(resp.headers.get('content-range')?.split('/')[1] || '0');
    S.counts = {
      p0: getCount(p0Res),
      p1: getCount(p1Res),
      p2: getCount(p2Res),
      total: getCount(p0Res) + getCount(p1Res) + getCount(p2Res)
    };
  } catch(e) {
    console.error('Filter fetch error:', e);
  }
}

/* ── 点赞 ── */
async function doLike(id, btn) {
  try {
    const getResp = await fetch(`${API_BASE}/ai_news?select=likes&id=eq.${id}`, { headers: HEADERS });
    const rows = await getResp.json();
    if (!rows.length) return;

    const newLikes = (rows[0].likes || 0) + 1;

    await fetch(`${API_BASE}/ai_news?id=eq.${id}`, {
      method: 'PATCH',
      headers: HEADERS,
      body: JSON.stringify({ likes: newLikes })
    });

    S.liked.add(id);
    btn.querySelector('span').textContent = newLikes;
    const svg = btn.querySelector('svg');
    svg.setAttribute('fill', 'currentColor');
    btn.classList.add('liked');
  } catch(e) {
    console.error('Like error:', e);
  }
}

/* ── 时间格式化 ── */
function fmtTime(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function fmtDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

/* ── Render ── */
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function render(result) {
  const app = $('#app');
  if (!result || !result.data || !result.data.length) {
    app.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 4h16v16H4z"/><path d="M9 9h6M9 13h4"/></svg>
      <p>暂无匹配的资讯</p>
      <p style="margin-top:8px;font-size:13px">试试调整筛选条件</p>
    </div>`;
    return;
  }

  updateStats();
  updateSelects();

  app.innerHTML = result.data.map((it, i) => {
    const isOpen = S.open.has(it.id);
    const delay = Math.min(i * 0.04, 0.4);
    return `<article class="card${isOpen ? ' open' : ''}" data-p="${it.priority}" data-id="${it.id}" style="animation-delay:${delay}s">
      <div class="c-head">
        <span class="badge badge-${it.priority}">P${it.priority}</span>
        <span class="cat cat-${esc(it.category)}">${esc(it.category)}</span>
        <span class="plat">${esc(it.platform)}</span>
        <span class="c-date">${fmtTime(it.date)}</span>
      </div>
      <div class="c-body">
        <p class="summary">${esc(it.summary)}</p>
      </div>
      <div class="c-foot">
        <button class="c-btn like-btn${S.liked.has(it.id) ? ' liked' : ''}" onclick="doLike(${it.id},this)">
          <svg class="h-icon" viewBox="0 0 24 24" fill="${S.liked.has(it.id) ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 000-7.78z"/></svg>
          <span>${it.likes || 0}</span>
        </button>
        <button class="c-btn" onclick="doToggle(${it.id})">
          ${isOpen ? '收起' : '详情'}
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="transform:rotate(${isOpen ? 180 : 0}deg)"><path d="M6 9l6 6 6-6"/></svg>
        </button>
      </div>
      <div class="c-detail">
        <div class="c-detail-inner">
          <div class="d-label">详细内容</div>
          <div class="d-text">${esc(it.cn_text)}</div>
          <div style="margin-bottom:18px">
            <div class="d-label">原文链接</div>
            <a class="d-link" href="${esc(it.url)}" target="_blank" rel="noopener">
              ${esc(it.url)}
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg>
            </a>
          </div>
          <button class="en-toggle" onclick="toggleEn(this)">显示英文原文</button>
          <div class="en-body">${esc(it.en_text)}</div>
        </div>
      </div>
    </article>`;
  }).join('');
}

function updateStats() {
  const c = S.counts;
  $('#stats').innerHTML = `
    <span class="s"><span class="dot" style="background:#fff"></span> 共 <b>${c.total}</b> 条</span>
    <span class="s"><span class="dot" style="background:var(--p0)"></span> 非常相关 ${c.p0}</span>
    <span class="s"><span class="dot" style="background:var(--p1)"></span> 相关 ${c.p1}</span>
    <span class="s"><span class="dot" style="background:var(--p2)"></span> P2 ${c.p2}</span>`;

  const pills = $$('#pills .pill');
  if (pills[0]) pills[0].textContent = `全部 (${c.total})`;
  if (pills[1]) pills[1].textContent = `P0 非常相关 (${c.p0})`;
  if (pills[2]) pills[2].textContent = `P1 相关 (${c.p1})`;
  if (pills[3]) pills[3].textContent = `P2 关注 (${c.p2})`;
}

function updateSelects() {
  setOpts('#fCat', S.filters.categories, S.f.cat, '全部分类');
  setOpts('#fPlat', S.filters.platforms, S.f.plat, '全部平台');
  setOpts('#fDate', S.filters.dates, S.f.date, '全部日期');
}

function setOpts(sel, list, cur, all) {
  const el = $(sel);
  el.innerHTML = `<option value="">${all}</option>` +
    (list || []).map(v => `<option value="${esc(v)}"${v === cur ? ' selected' : ''}>${esc(v)}</option>`).join('');
}

/* ── Actions ── */
function doToggle(id) {
  S.open.has(id) ? S.open.delete(id) : S.open.add(id);
  load();
}

function toggleEn(btn) {
  const body = btn.nextElementSibling;
  const show = body.classList.toggle('show');
  btn.textContent = show ? '收起英文原文' : '显示英文原文';
}

/* ── Events ── */
$('#pills').addEventListener('click', e => {
  const p = e.target.closest('.pill');
  if (!p) return;
  $$('#pills .pill').forEach(b => b.classList.remove('on'));
  p.classList.add('on');
  S.f.p = p.dataset.p;
  load();
});

['fCat', 'fPlat', 'fDate'].forEach(id => {
  $(`#${id}`).addEventListener('change', e => {
    const k = { fCat: 'cat', fPlat: 'plat', fDate: 'date' }[id];
    S.f[k] = e.target.value;
    load();
  });
});

let _st;
$('#q').addEventListener('input', e => {
  clearTimeout(_st);
  _st = setTimeout(() => { S.f.q = e.target.value.trim(); load(); }, 280);
});

window.addEventListener('scroll', () => {
  $('#bt').classList.toggle('show', scrollY > 500);
});
$('#bt').addEventListener('click', () => scroll({ top: 0, behavior: 'smooth' }));

/* ── Init ── */
async function load() {
  await fetchFiltersAndCounts();
  const result = await fetchNews();
  render(result);
}
load();
</script>
</body>
</html>
